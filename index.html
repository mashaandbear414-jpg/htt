<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Yrener</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#04050a;
  --glass:rgba(255,255,255,0.07);
  --glass2:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.12);
  --accent:#4d8fff;
  --text:rgba(255,255,255,0.92);
  --muted:rgba(255,255,255,0.35);
  --gold:#ffd166;
  --green:#06d6a0;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Inter',sans-serif;color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:14px;position:relative}

/* BG */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(110px);opacity:.13;animation:drift 22s ease-in-out infinite}
.orb1{width:650px;height:650px;top:-220px;left:-220px;background:radial-gradient(circle,#2050ee,transparent)}
.orb2{width:500px;height:500px;bottom:-160px;right:-160px;background:radial-gradient(circle,#6a28ee,transparent);animation-delay:-11s}
.orb3{width:300px;height:300px;top:40%;left:40%;background:radial-gradient(circle,#1a70ff,transparent);opacity:.07;animation-delay:-5s}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-14px)}}

/* noise */
body::after{content:'';position:fixed;inset:0;z-index:1;opacity:.022;pointer-events:none;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.wrap{position:relative;z-index:2;width:100%;max-width:460px;display:flex;flex-direction:column;align-items:center;gap:14px}

/* LOGO */
.logo{font-family:'Unbounded',sans-serif;font-weight:200;font-size:18px;letter-spacing:.14em}
.logo b{color:var(--accent);font-weight:300}

/* BADGE */
.badge{
  padding:5px 14px;border-radius:100px;
  border:1px solid var(--border);
  background:var(--glass);
  backdrop-filter:blur(50px) saturate(180%);
  -webkit-backdrop-filter:blur(50px) saturate(180%);
  font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;gap:8px;
}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:blink 2s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* ROULETTE */
.roulette-wrap{width:100%;position:relative}
.roulette-box{
  width:100%;border-radius:20px;overflow:hidden;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(60px) saturate(200%);
  -webkit-backdrop-filter:blur(60px) saturate(200%);
  position:relative;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.08), 0 8px 40px rgba(0,0,0,0.4);
}
.roulette-box::before,.roulette-box::after{
  content:'';position:absolute;top:0;bottom:0;width:100px;z-index:5;pointer-events:none;
}
.roulette-box::before{left:0;background:linear-gradient(to right,rgba(4,5,10,.97),rgba(4,5,10,.5),transparent)}
.roulette-box::after{right:0;background:linear-gradient(to left,rgba(4,5,10,.97),rgba(4,5,10,.5),transparent)}

/* marker */
.marker{
  position:absolute;left:50%;top:0;bottom:0;
  transform:translateX(-50%);width:2px;
  background:linear-gradient(to bottom,transparent,var(--accent),transparent);
  z-index:6;pointer-events:none;
  box-shadow:0 0 18px rgba(77,143,255,.9);
}
.marker::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);border-left:7px solid transparent;border-right:7px solid transparent;border-top:9px solid var(--accent)}
.marker::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:9px solid var(--accent)}

.viewport{overflow:hidden;padding:10px 0}
.track{display:flex;flex-direction:row;gap:5px;padding:0 6px;will-change:transform}

/* items */
.item{
  flex-shrink:0;width:82px;height:82px;border-radius:13px;
  border:1px solid rgba(255,255,255,0.09);
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  position:relative;overflow:hidden;
  transition:border-color .4s,box-shadow .4s,background .4s;
}
.item::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,transparent 60%);
  pointer-events:none;
}
.item-label{font-family:'Unbounded',sans-serif;font-weight:300;font-size:8px;text-align:center;line-height:1.3;padding:0 5px;letter-spacing:.04em}
.item-stripe{width:100%;height:3px;position:absolute;bottom:0}

.t-nothing .item-stripe{background:rgba(255,255,255,.12)}.t-nothing .item-label{color:var(--muted)}
.t-day1 .item-stripe{background:var(--green)}.t-day1 .item-label{color:var(--green)}
.t-day3 .item-stripe{background:var(--gold)}.t-day3 .item-label{color:var(--gold)}

.win-green{border-color:var(--green)!important;background:rgba(6,214,160,.08)!important;box-shadow:0 0 26px rgba(6,214,160,.28)!important}
.win-gold{border-color:var(--gold)!important;background:rgba(255,209,102,.08)!important;box-shadow:0 0 26px rgba(255,209,102,.28)!important}

/* PRIZES */
.prizes{
  width:100%;border-radius:18px;
  border:1px solid var(--border);
  background:var(--glass);
  backdrop-filter:blur(50px) saturate(180%);
  -webkit-backdrop-filter:blur(50px) saturate(180%);
  overflow:hidden;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.06);
}
.prize-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px;color:rgba(255,255,255,.7)}
.prize-row:last-child{border:none}
.prize-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* BTN */
.spin-btn{
  width:100%;padding:16px;border-radius:14px;border:none;cursor:pointer;
  font-family:'Unbounded',sans-serif;font-size:13px;font-weight:300;letter-spacing:.05em;
  background:linear-gradient(135deg,#2a5fff,#6a3fff);
  color:#fff;
  box-shadow:0 8px 32px rgba(42,95,255,.35), inset 0 1px 0 rgba(255,255,255,0.15);
  transition:all .3s;position:relative;overflow:hidden;
  backdrop-filter:blur(10px);
}
.spin-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);opacity:1}
.spin-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 12px 36px rgba(42,95,255,.5)}
.spin-btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* SHEET */
.sheet-overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.7);backdrop-filter:blur(16px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s}
.sheet-overlay.show{opacity:1;pointer-events:all}
.sheet{
  width:100%;max-width:460px;
  background:rgba(5,6,14,.96);
  backdrop-filter:blur(60px) saturate(200%);
  -webkit-backdrop-filter:blur(60px) saturate(200%);
  border:1px solid var(--border);border-radius:24px 24px 0 0;
  padding:28px 22px 44px;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.4,0,.2,1);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.07);
}
.sheet-overlay.show .sheet{transform:translateY(0)}
.sheet-title{font-family:'Unbounded',sans-serif;font-weight:300;font-size:19px;text-align:center;margin-bottom:8px}
.sheet-sub{font-size:13px;color:var(--muted);text-align:center;line-height:1.65;margin-bottom:20px}
.btn-ghost{
  width:100%;padding:14px;border-radius:13px;
  border:1px solid var(--border);
  background:var(--glass2);
  backdrop-filter:blur(30px);
  cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;color:var(--muted);transition:.3s;
}
.btn-ghost:hover{color:var(--text)}
</style>
</head>
<body>
<div class="bg"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>

<div class="wrap">
  <div class="logo">Yr<b>e</b>ner</div>

  <div class="badge">
    <div class="badge-dot"></div>
    <span id="badgeText">1 прокрутка доступна</span>
  </div>

  <div class="roulette-wrap">
    <div class="roulette-box">
      <div class="marker"></div>
      <div class="viewport"><div class="track" id="track"></div></div>
    </div>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spinNow()">Крутить</button>

  <div class="prizes">
    <div class="prize-row"><div class="prize-dot" style="background:#444"></div>Ничего</div>
    <div class="prize-row"><div class="prize-dot" style="background:var(--green)"></div>Подписка 1 день</div>
    <div class="prize-row"><div class="prize-dot" style="background:var(--gold)"></div>Подписка 3 дня</div>
  </div>
</div>

<div class="sheet-overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-title" id="sTitle"></div>
    <div class="sheet-sub" id="sSub"></div>
    <button class="btn-ghost" onclick="closeSheet()">Закрыть</button>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.setHeaderColor('#04050a'); tg.setBackgroundColor('#04050a'); }

const PRIZES = [
  { id:'nothing', w:75, label:'Ничего', cls:'t-nothing', wCls:'' },
  { id:'day1',    w:15, label:'1 день', cls:'t-day1',    wCls:'win-green' },
  { id:'day3',    w:10, label:'3 дня',  cls:'t-day3',    wCls:'win-gold'  },
];
const POOL = [];
PRIZES.forEach(p => { for(let i=0;i<p.w;i++) POOL.push(p); });

let spinning = false, autoAnim = null, autoOffset = 0, lastTs = null;
let spinsLeft = getSpins();

function getTashkent10() {
  // 10:00 Ташкент = 05:00 UTC
  const now = new Date();
  const reset = new Date();
  reset.setUTCHours(5, 0, 0, 0); // 05:00 UTC = 10:00 Ташкент
  // если сейчас уже после 05:00 UTC — берём сегодня, иначе вчера
  if (now.getTime() < reset.getTime()) {
    reset.setUTCDate(reset.getUTCDate() - 1);
  }
  return reset.getTime();
}
function getSpins() {
  const lastReset = parseInt(localStorage.getItem('lastReset') ?? '0');
  const currentReset = getTashkent10();
  if (lastReset < currentReset) {
    localStorage.setItem('spinsLeft', '1');
    localStorage.setItem('lastReset', currentReset.toString());
    return 1;
  }
  return parseInt(localStorage.getItem('spinsLeft') ?? '1');
}
function saveSpins(n) { localStorage.setItem('spinsLeft', String(n)); }
function updateBadge() { document.getElementById('badgeText').textContent = spinsLeft > 0 ? `${spinsLeft} прокрутка доступна` : 'Прокрутки закончились'; }
updateBadge();
if (spinsLeft <= 0) document.getElementById('spinBtn').disabled = true;

function pick() { return POOL[Math.floor(Math.random()*POOL.length)]; }

const ITEM_W=82, GAP=5, STEP=87, COUNT=120;

function buildTrack() {
  const t = document.getElementById('track');
  t.innerHTML = '';
  for (let i=0;i<COUNT;i++) {
    const p=pick();
    const d=document.createElement('div');
    d.className=`item ${p.cls}`;
    d.innerHTML=`<div class="item-label">${p.label}</div><div class="item-stripe"></div>`;
    t.appendChild(d);
  }
}

// AUTO SLOW SCROLL
function autoScroll(ts) {
  if (!lastTs) lastTs = ts;
  const dt = ts - lastTs; lastTs = ts;
  autoOffset -= dt * 0.025; // медленнее
  const track = document.getElementById('track');
  const totalW = COUNT * STEP;
  if (Math.abs(autoOffset) > totalW * 0.45) autoOffset = 0;
  track.style.transition = 'none';
  track.style.transform = `translateX(${autoOffset}px)`;
  autoAnim = requestAnimationFrame(autoScroll);
}
function startAuto() { if (autoAnim) return; lastTs = null; autoAnim = requestAnimationFrame(autoScroll); }
function stopAuto() { if (autoAnim) { cancelAnimationFrame(autoAnim); autoAnim = null; } }

buildTrack();
startAuto();

// SPIN
function spinNow() {
  if (spinning || spinsLeft <= 0) return;
  spinning = true;
  stopAuto();
  document.getElementById('spinBtn').disabled = true;

  buildTrack();
  const track = document.getElementById('track');
  const cx = track.closest('.roulette-box').clientWidth / 2;
  const winIdx = 70;
  const winner = pick();
  const items = track.querySelectorAll('.item');
  const wi = items[winIdx];
  wi.className = `item ${winner.cls}`;
  wi.querySelector('.item-label').textContent = winner.label;

  const itemCenter = winIdx * STEP + ITEM_W/2 + 6;
  const target = -(itemCenter - cx) + (Math.random()-.5)*14;

  track.style.transition = 'none';
  track.style.transform = 'translateX(0)';

  requestAnimationFrame(() => requestAnimationFrame(() => {
    track.style.transition = 'transform 6.5s cubic-bezier(0.06,0.97,0.22,1)';
    track.style.transform = `translateX(${target}px)`;
  }));

  setTimeout(() => {
    if (winner.wCls) wi.classList.add(winner.wCls);
    spinning = false;
    spinsLeft--;
    saveSpins(spinsLeft);
    updateBadge();
    tg?.HapticFeedback?.notificationOccurred(winner.id==='nothing'?'warning':'success');
    tg?.sendData(JSON.stringify({ prize: winner.id }));
    showResult(winner);
  }, 6800);
}

function showResult(prize) {
  if (prize.id === 'nothing') {
    document.getElementById('sTitle').textContent = 'Не повезло';
    document.getElementById('sSub').textContent   = 'Сожалеем, вам выпало Ничего. Попробуйте завтра!';
  } else {
    document.getElementById('sTitle').textContent = 'Поздравляем!';
    document.getElementById('sSub').textContent   = `Вам выпала подписка на ${prize.label}! Бот автоматически отправит вам ключ — проверьте чат с ботом.`;
  }
  document.getElementById('overlay').classList.add('show');
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('show');
  if (spinsLeft <= 0) document.getElementById('spinBtn').disabled = true;
  else startAuto();
}
</script>
</body>
</html>
