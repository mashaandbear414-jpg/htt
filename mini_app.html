<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Yrener</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#04050a;--glass:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.10);--accent:#4d8fff;--text:rgba(255,255,255,0.92);--muted:rgba(255,255,255,0.35);--gold:#ffd166;--green:#06d6a0}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Inter',sans-serif;color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:22px;position:relative}
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.12;animation:drift 20s ease-in-out infinite}
.orb1{width:600px;height:600px;top:-200px;left:-200px;background:radial-gradient(circle,#2d5fff,transparent)}
.orb2{width:450px;height:450px;bottom:-150px;right:-150px;background:radial-gradient(circle,#7b3fff,transparent);animation-delay:-10s}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(18px,-12px)}}
.wrap{position:relative;z-index:2;width:100%;max-width:460px;display:flex;flex-direction:column;align-items:center;gap:22px}
.logo{font-family:'Unbounded',sans-serif;font-weight:200;font-size:20px;letter-spacing:.12em}
.logo b{color:var(--accent);font-weight:300}
.badge{padding:6px 16px;border-radius:100px;border:1px solid var(--border);background:var(--glass);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.roulette-wrap{width:100%;position:relative}
.roulette-box{width:100%;border-radius:20px;overflow:hidden;border:1px solid var(--border);background:rgba(255,255,255,0.03);backdrop-filter:blur(40px);position:relative}
.roulette-box::before,.roulette-box::after{content:'';position:absolute;top:0;bottom:0;width:100px;z-index:5;pointer-events:none}
.roulette-box::before{left:0;background:linear-gradient(to right,rgba(4,5,10,.96),transparent)}
.roulette-box::after{right:0;background:linear-gradient(to left,rgba(4,5,10,.96),transparent)}
.marker{position:absolute;left:50%;top:0;bottom:0;transform:translateX(-50%);width:2px;background:var(--accent);z-index:6;box-shadow:0 0 16px rgba(77,143,255,.8);pointer-events:none}
.marker::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);border-left:8px solid transparent;border-right:8px solid transparent;border-top:10px solid var(--accent)}
.marker::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:10px solid var(--accent)}
.viewport{overflow:hidden;padding:14px 0}
.track{display:flex;flex-direction:row;gap:6px;padding:0 8px;transition:transform 0s;will-change:transform}
.item{flex-shrink:0;width:88px;height:88px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,0.03);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;position:relative;overflow:hidden}
.item::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04),transparent);pointer-events:none}
.item-label{font-family:'Unbounded',sans-serif;font-weight:300;font-size:9px;text-align:center;line-height:1.3;color:var(--muted);padding:0 6px;letter-spacing:.04em}
.item-stripe{width:100%;height:3px;position:absolute;bottom:0;border-radius:0 0 14px 14px}
.t-nothing .item-stripe{background:rgba(255,255,255,.1)}
.t-day1 .item-stripe{background:var(--green)}.t-day1 .item-label{color:var(--green)}
.t-day3 .item-stripe{background:var(--gold)}.t-day3 .item-label{color:var(--gold)}
.win-green{border-color:var(--green)!important;background:rgba(6,214,160,.06)!important;box-shadow:0 0 24px rgba(6,214,160,.2)!important}
.win-gold{border-color:var(--gold)!important;background:rgba(255,209,102,.06)!important;box-shadow:0 0 24px rgba(255,209,102,.2)!important}
.spin-btn{width:100%;padding:17px;border-radius:16px;border:none;cursor:pointer;font-family:'Unbounded',sans-serif;font-size:13px;font-weight:300;letter-spacing:.05em;background:linear-gradient(135deg,#3a6fff,#7b5fff);color:#fff;box-shadow:0 8px 28px rgba(58,111,255,.3);transition:all .3s;position:relative;overflow:hidden}
.spin-btn:disabled{opacity:.4;cursor:not-allowed}
.sheet-overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.sheet-overlay.show{opacity:1;pointer-events:all}
.sheet{width:100%;max-width:460px;background:rgba(6,7,14,.98);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:32px 24px 44px;transform:translateY(100%);transition:transform .4s cubic-bezier(.4,0,.2,1)}
.sheet-overlay.show .sheet{transform:translateY(0)}
.sheet-title{font-family:'Unbounded',sans-serif;font-weight:300;font-size:20px;text-align:center;margin-bottom:8px}
.sheet-sub{font-size:13px;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:24px}
.key-box{padding:15px;border-radius:12px;background:rgba(77,143,255,.07);border:1px solid rgba(77,143,255,.2);font-family:'Unbounded',sans-serif;font-size:17px;font-weight:300;text-align:center;letter-spacing:.12em;color:var(--accent);margin-bottom:8px;cursor:pointer;transition:background .2s}
.key-box.ok{color:var(--green);border-color:rgba(6,214,160,.3);background:rgba(6,214,160,.07)}
.hint{font-size:11px;color:var(--muted);text-align:center;margin-bottom:20px}
.btn-main{width:100%;padding:15px;border-radius:14px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;background:linear-gradient(135deg,#3a6fff,#7b5fff);color:#fff;margin-bottom:10px;transition:.3s;text-decoration:none;display:block;text-align:center}
.btn-ghost{width:100%;padding:15px;border-radius:14px;border:1px solid var(--border);background:transparent;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;color:var(--muted);transition:.3s}
</style>
</head>
<body>
<div class="bg"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="wrap">
  <div class="logo">Yr<b>e</b>ner</div>
  <div class="badge"><div class="badge-dot"></div><span id="badgeText">1 прокрутка доступна</span></div>
  <div class="roulette-wrap">
    <div class="roulette-box">
      <div class="marker"></div>
      <div class="viewport"><div class="track" id="track"></div></div>
    </div>
  </div>
  <button class="spin-btn" id="spinBtn" onclick="spin()">Крутить</button>
</div>
<div class="sheet-overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-title" id="sTitle"></div>
    <div class="sheet-sub" id="sSub"></div>
    <div class="key-box" id="sKey" onclick="copyKey()" style="display:none"></div>
    <div class="hint" id="sHint" style="display:none">нажмите чтобы скопировать</div>
    <a href="https://t.me/YrenerBot" class="btn-main" id="sTgBtn" style="display:none" target="_blank">Открыть бота и ввести ключ</a>
    <button class="btn-ghost" onclick="closeSheet()">Закрыть</button>
  </div>
</div>
<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.expand();tg.setHeaderColor('#04050a');tg.setBackgroundColor('#04050a')}
const PRIZES=[{id:'nothing',w:50,label:'Ничего',cls:'t-nothing',wCls:''},{id:'day1',w:10,label:'1 день',cls:'t-day1',wCls:'win-green'},{id:'day3',w:15,label:'3 дня',cls:'t-day3',wCls:'win-gold'}];
const POOL=[];PRIZES.forEach(p=>{for(let i=0;i<p.w*2;i++)POOL.push(p)});
let spinning=false,spinsLeft=getSpins();
function getSpins(){const d=localStorage.getItem('spinDate'),t=new Date().toDateString();if(d!==t){localStorage.setItem('spinsLeft','1');localStorage.setItem('spinDate',t);return 1}return parseInt(localStorage.getItem('spinsLeft')??'1')}
function saveSpins(n){localStorage.setItem('spinsLeft',n.toString());localStorage.setItem('spinDate',new Date().toDateString())}
function updateBadge(){document.getElementById('badgeText').textContent=spinsLeft>0?`${spinsLeft} прокрутка доступна`:'Прокрутки закончились'}
updateBadge();if(spinsLeft<=0)document.getElementById('spinBtn').disabled=true;
function pick(){return POOL[Math.floor(Math.random()*POOL.length)]}
function buildTrack(){const t=document.getElementById('track');t.innerHTML='';for(let i=0;i<80;i++){const p=pick();const d=document.createElement('div');d.className=`item ${p.cls}`;d.dataset.id=p.id;d.innerHTML=`<div class="item-label">${p.label}</div><div class="item-stripe"></div>`;t.appendChild(d)}}
function spin(){
  if(spinning||spinsLeft<=0)return;
  spinning=true;document.getElementById('spinBtn').disabled=true;
  buildTrack();
  const track=document.getElementById('track');
  const outer=track.closest('.roulette-box');
  const cx=outer.clientWidth/2;
  const winIdx=58;const winner=pick();
  const items=track.querySelectorAll('.item');
  const wi=items[winIdx];
  wi.className=`item ${winner.cls}`;wi.dataset.id=winner.id;
  wi.querySelector('.item-label').textContent=winner.label;
  const step=94,target=-(winIdx*step+44-cx)+((Math.random()-.5)*16);
  track.style.transition='none';track.style.transform='translateX(0)';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    track.style.transition='transform 5s cubic-bezier(0.10,0.92,0.28,1)';
    track.style.transform=`translateX(${target}px)`;
  }));
  setTimeout(()=>{
    if(winner.wCls)wi.classList.add(winner.wCls);
    spinning=false;spinsLeft--;saveSpins(spinsLeft);updateBadge();
    showResult(winner);
    tg?.HapticFeedback?.notificationOccurred(winner.id==='nothing'?'warning':'success');
  },5300);
}
function showResult(prize){
  const keyEl=document.getElementById('sKey'),hint=document.getElementById('sHint'),tgBtn=document.getElementById('sTgBtn');
  keyEl.style.display='none';hint.style.display='none';tgBtn.style.display='none';
  if(prize.id==='nothing'){
    document.getElementById('sTitle').textContent='Не повезло';
    document.getElementById('sSub').textContent='Сожалеем, вам выпало Ничего. Попробуйте завтра!';
  } else {
    const key='Yrener'+Array.from({length:4},()=>Math.floor(Math.random()*10)).join('');
    document.getElementById('sTitle').textContent='Поздравляем!';
    document.getElementById('sSub').textContent=`Вам выпала подписка на ${prize.label}! Скопируйте ключ и введите его в бота.`;
    keyEl.textContent=key;keyEl.dataset.val=key;
    keyEl.style.display='block';hint.style.display='block';tgBtn.style.display='block';
    tg?.sendData(JSON.stringify({prize:prize.id,key}));
  }
  document.getElementById('overlay').classList.add('show');
}
function closeSheet(){document.getElementById('overlay').classList.remove('show');if(spinsLeft<=0)document.getElementById('spinBtn').disabled=true}
function copyKey(){const el=document.getElementById('sKey'),val=el.dataset.val,orig=el.textContent;navigator.clipboard?.writeText(val).catch(()=>{});el.textContent='Скопировано';el.classList.add('ok');setTimeout(()=>{el.textContent=orig;el.classList.remove('ok')},2000)}
buildTrack();
</script>
</body>
</html>
